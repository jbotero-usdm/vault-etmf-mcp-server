<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDM SmartTMF — Box to Vault via Glean</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1F3864;--teal:#00838F;--sky:#0097A7;--dark:#0D1B2A;--surface:#F8FAFC;--card:#FFFFFF;--border:#E2E8F0;--text:#1E293B;--text2:#64748B;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;--r:10px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--surface);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}.sidebar{width:230px;background:linear-gradient(180deg,var(--dark) 0%,#162544 50%,var(--navy) 100%);color:#fff;display:flex;flex-direction:column;flex-shrink:0}.sidebar-logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}.logo-text span:first-child{font-size:15px;font-weight:700}.logo-text span:last-child{display:block;font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--sky)}.sidebar-nav{flex:1;padding:6px 8px;overflow-y:auto}.nav-section{margin:14px 0 5px 10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25)}.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);transition:all .12s;margin:1px 0;position:relative}.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}.nav-item.active{background:rgba(0,151,167,.18);color:#fff;font-weight:600}.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:var(--sky)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}.header{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0}.header-title{font-size:15px;font-weight:700;color:var(--navy)}.header-sub{font-size:11.5px;color:var(--text2)}.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}.pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap}.pill::before{content:'';width:5px;height:5px;border-radius:50%}.pill-g{background:#ECFDF5;color:#065F46}.pill-g::before{background:var(--green)}.pill-b{background:#EFF6FF;color:#1E40AF}.pill-b::before{background:var(--blue)}.content{flex:1;overflow-y:auto;padding:20px 24px 40px}
.g{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.mb{margin-bottom:14px}.mb2{margin-bottom:20px}.c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}.ct{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px}.stat{text-align:center;padding:12px 10px;cursor:pointer}.sv{font-size:24px;font-weight:700;color:var(--navy)}.sl{font-size:10.5px;color:var(--text2);margin-top:2px;font-weight:500}.ss{font-size:10px;margin-top:4px;font-weight:600}.ok{color:var(--green)}.warn{color:var(--amber)}.err{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:12.5px}th{text-align:left;padding:8px 10px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);border-bottom:2px solid var(--border);background:var(--surface)}td{padding:8px 10px;border-bottom:1px solid var(--border)}tr:last-child td{border-bottom:none}tbody tr:hover td{background:rgba(0,131,143,.015)}
.b{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}.bg{background:#ECFDF5;color:#065F46}.ba{background:#FFFBEB;color:#92400E}.br{background:#FEF2F2;color:#991B1B}.bb{background:#EFF6FF;color:#1E40AF}.bx{background:#F1F5F9;color:#475569}.btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;font-family:inherit}.bp1{background:var(--teal);color:#fff}.bo1{background:transparent;border:1px solid var(--border);color:var(--text)}
.panel{display:none}.panel.active{display:block}.hint{font-size:11px;color:var(--text2)}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo"><div class="logo-text"><span>SmartTMF</span><span>USDM Life Sciences</span></div></div>
  <div class="sidebar-nav">
    <div class="nav-section">Core</div>
    <div class="nav-item active" data-v="dashboard">Dashboard</div>
    <div class="nav-item" data-v="documents">Documents</div>
    <div class="nav-item" data-v="qc">QC Workflow</div>
    <div class="nav-item" data-v="analytics">Analytics</div>
    <div class="nav-section">Operations</div>
    <div class="nav-item" data-v="cro">CRO View</div>
    <div class="nav-item" data-v="onboarding">Onboarding</div>
    <div class="nav-item" data-v="vault">Vault via Glean</div>
    <div class="nav-item" data-v="agent">Agent</div>
    <div class="nav-item" data-v="admin">Admin Health</div>
  </div>
</nav>
<main class="main">
  <header class="header">
    <div><div class="header-title" id="hT">Dashboard</div><div class="header-sub" id="hS">Live Box intake and Vault filing oversight</div></div>
    <div class="header-right"><div class="pill pill-g">Box Connected</div><div class="pill pill-b">Vault Connected via Glean</div></div>
  </header>
  <div class="content" id="content"></div>
</main>
</div>
<script>
const state={overview:null,intake:null,vault:null,health:null};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function fmt(v){if(v===undefined||v===null||v==='') return '—'; return v;}
function d(v){if(!v) return '—'; try{return new Date(v).toLocaleString()}catch(e){return v}}
async function j(u){const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(u+' '+r.status); return r.json();}
async function load(){try{const [overview,intake,vault,health]=await Promise.all([j('/api/overview'),j('/api/intake'),j('/api/vault-summary'),j('/api/health')]); state.overview=overview; state.intake=intake; state.vault=vault; state.health=health; nav(document.querySelector('.nav-item.active')?.dataset.v||'dashboard');}catch(e){console.error(e); document.getElementById('content').innerHTML=`<div class="c"><div class="ct">Live data error</div><div class="hint">${esc(e.message)}</div></div>`;}}
function healthChip(){const h=state.overview?.overview?.health||'amber'; return `<span class="b ${h==='green'?'bg':h==='red'?'br':'ba'}">${h.toUpperCase()}</span>`;}
const V={
  dashboard(){const o=state.overview?.overview||{}; const intake=state.intake?.intake||{}; return `
    <div class="g g4 mb2">
      <div class="c stat" onclick="nav('vault')"><div class="sv">${fmt(o.activeStudies)}</div><div class="sl">Active Studies</div><div class="ss ok">Click for Vault breakdown</div></div>
      <div class="c stat" onclick="nav('cro')"><div class="sv">${fmt(o.croPartners)}</div><div class="sl">CRO Partners</div><div class="ss">Live from intake pattern</div></div>
      <div class="c stat" onclick="nav('documents')"><div class="sv">${fmt(o.documentsFiled)}</div><div class="sl">Documents Filed</div><div class="ss ok">Vault source of record</div></div>
      <div class="c stat" onclick="nav('vault')"><div class="sv">${fmt(o.sitesActive)}</div><div class="sl">Sites Active</div><div class="ss">Study/site context</div></div>
    </div>
    <div class="g g2 mb">
      <div class="c"><div class="ct">Intake Overview</div>
        <div class="g g4 mb">
          <div class="c stat" onclick="nav('documents')"><div class="sv">${fmt(intake.newItems)}</div><div class="sl">New Intake Items</div></div>
          <div class="c stat" onclick="nav('documents')"><div class="sv">${fmt(intake.readyForClassification)}</div><div class="sl">Needs Classification</div></div>
          <div class="c stat" onclick="nav('qc')"><div class="sv">${fmt(intake.inQcReview)}</div><div class="sl">In QC Review</div></div>
          <div class="c stat" onclick="nav('documents')"><div class="sv">${fmt(intake.approvedCount)}</div><div class="sl">Filed / Approved</div></div>
        </div>
        <div class="hint">Box is the intake work queue. Vault is the source of record. Glean provides filing support and oversight.</div>
      </div>
      <div class="c"><div class="ct">TMF Health</div>
        <div style="font-size:32px;font-weight:800;margin-bottom:10px">${healthChip()}</div>
        <div class="hint">Main page keeps health simple. Click into Analytics or Admin Health for actual document, object, and user counts.</div>
        <div style="margin-top:12px"><button class="btn bp1" onclick="nav('analytics')">View details</button></div>
      </div>
    </div>
    <div class="g g2">
      <div class="c"><div class="ct">Intake by Study</div>
      <table><thead><tr><th>Study</th><th>Files</th><th>Needs Class.</th><th>In QC</th></tr></thead><tbody>
      ${(intake.studies||[]).length?(intake.studies||[]).map(s=>`<tr><td><strong><a href="#" onclick="nav('documents');return false;">${esc(s.study)}</a></strong></td><td>${fmt(s.count)}</td><td>${fmt(s.readyForClassification)}</td><td>${fmt(s.inQc)}</td></tr>`).join(''):`<tr><td colspan="4">No study groupings returned from Box yet.</td></tr>`}
      </tbody></table></div>
      <div class="c"><div class="ct">Recent Intake Activity</div>
      <table><thead><tr><th>File</th><th>Study</th><th>Stage</th><th>Updated</th></tr></thead><tbody>
      ${(intake.recentFiles||[]).length?(intake.recentFiles||[]).map(f=>`<tr><td><strong><a href="#" onclick="nav('documents');return false;">${esc(f.name)}</a></strong></td><td>${esc(f.study||'Unassigned')}</td><td>${esc(f.stage||'Intake')}</td><td>${d(f.modified_at||f.created_at)}</td></tr>`).join(''):`<tr><td colspan="4">No recent Box files found.</td></tr>`}
      </tbody></table></div>
    </div>`},
  documents(){const intake=state.intake?.intake||{}; return `<div class="c"><div class="ct">Live Document Worklist</div><table><thead><tr><th>File</th><th>Study</th><th>Artifact</th><th>Stage</th><th>Updated</th></tr></thead><tbody>${(intake.recentFiles||[]).length?(intake.recentFiles||[]).map(f=>`<tr><td><strong>${esc(f.name)}</strong></td><td>${esc(f.study)}</td><td>${esc(f.artifactType||'Needs classification')}</td><td><span class="b bb">${esc(f.stage||'Intake')}</span></td><td>${d(f.modified_at||f.created_at)}</td></tr>`).join(''):`<tr><td colspan="5">No files returned from Box intake.</td></tr>`}</tbody></table></div>`},
  qc(){const intake=state.intake?.intake||{}; const q=(intake.recentFiles||[]).filter(f=>String(f.stage).toLowerCase().includes('qc')); return `<div class="c"><div class="ct">QC Review Queue</div><table><thead><tr><th>Document</th><th>Study</th><th>Stage</th><th>Updated</th></tr></thead><tbody>${q.length?q.map(f=>`<tr><td><strong>${esc(f.name)}</strong></td><td>${esc(f.study)}</td><td>${esc(f.stage)}</td><td>${d(f.modified_at||f.created_at)}</td></tr>`).join(''):`<tr><td colspan="4">No files currently in QC Review.</td></tr>`}</tbody></table></div>`},
  analytics(){const h=state.health||{}; const ds=h.datasources||{}; return `<div class="g g4 mb"><div class="c stat"><div class="sv">${healthChip()}</div><div class="sl">Live Indexing Health</div></div><div class="c stat"><div class="sv">${fmt(ds.documents?.indexed)}</div><div class="sl">Documents Indexed</div></div><div class="c stat"><div class="sv">${fmt(ds.objects?.indexed)}</div><div class="sl">Objects Indexed</div></div><div class="c stat"><div class="sv">${fmt(ds.security?.usersDiscovered)}</div><div class="sl">Users Discovered</div></div></div>
  <div class="c"><div class="ct">Admin Detail</div><table><thead><tr><th>Area</th><th>Status</th><th>Details</th></tr></thead><tbody><tr><td>Documents</td><td>${esc(ds.documents?.status||'—')}</td><td>${fmt(ds.documents?.indexed)} indexed</td></tr><tr><td>Objects</td><td>${esc(ds.objects?.status||'—')}</td><td>${fmt(ds.objects?.indexed)} indexed</td></tr><tr><td>Security</td><td>${esc(ds.security?.status||'—')}</td><td>${fmt(ds.security?.usersDiscovered)} users discovered</td></tr></tbody></table></div>`},
  cro(){const cros=state.intake?.intake?.cros||[]; return `<div class="c"><div class="ct">CRO View</div><table><thead><tr><th>CRO</th><th>Status</th></tr></thead><tbody>${cros.length?cros.map(c=>`<tr><td><strong>${esc(c)}</strong></td><td><span class="b bg">Active in intake</span></td></tr>`).join(''):`<tr><td colspan="2">No CROs inferred from current intake files yet.</td></tr>`}</tbody></table></div>`},
  onboarding(){return `<div class="c"><div class="ct">Onboarding</div><div class="hint">Use Box intake folders to onboard new CRO teams. As files arrive, SmartTMF groups them by study and stage, and Glean supports classification and filing oversight.</div></div>`},
  vault(){const v=state.vault||{}; return `<div class="g g2 mb"><div class="c"><div class="ct">Vault Summary</div><div class="g g4"><div class="c stat"><div class="sv">${fmt(v.studiesCount)}</div><div class="sl">Studies</div></div><div class="c stat"><div class="sv">${fmt(v.sitesCount)}</div><div class="sl">Sites</div></div><div class="c stat"><div class="sv">${fmt(v.documentsFiled)}</div><div class="sl">Recent Documents</div></div><div class="c stat"><div class="sv">${esc(state.health?.datasources?.documents?.name||'vaultetmfv2documents')}</div><div class="sl">Documents source</div></div></div></div><div class="c"><div class="ct">Vault via Glean</div><div class="hint">Vault remains the source of record. This view summarizes live study, site, and recent document context surfaced through the environment.</div></div></div><div class="g g2"><div class="c"><div class="ct">Documents by Study</div><table><thead><tr><th>Study</th><th>Recent Docs</th></tr></thead><tbody>${(v.documentsByStudy||[]).length?(v.documentsByStudy||[]).map(r=>`<tr><td>${esc(r.study)}</td><td>${fmt(r.count)}</td></tr>`).join(''):`<tr><td colspan="2">No Vault document summary available yet.</td></tr>`}</tbody></table></div><div class="c"><div class="ct">Recent Vault Documents</div><table><thead><tr><th>Document</th><th>Study</th><th>Updated</th></tr></thead><tbody>${(v.recentDocuments||[]).length?(v.recentDocuments||[]).map(d0=>`<tr><td><strong>${esc(d0.title__v||d0.name__v||d0.id)}</strong></td><td>${esc(d0.study__v||'Unassigned')}</td><td>${d(d0.version_modified_date__v)}</td></tr>`).join(''):`<tr><td colspan="3">No recent Vault documents available.</td></tr>`}</tbody></table></div></div>`},
  agent(){return `<div class="c"><div class="ct">ABC BioPharma TMF Filer Agent</div><div class="hint">The agent supports classification, study/site context lookup, and filing preparation with human oversight. It complements the Box intake workflow and Vault filing process.</div></div>`},
  admin(){return `<div class="c"><div class="ct">Admin Health</div><pre style="white-space:pre-wrap;font-size:12px;background:#0F172A;color:#E2E8F0;padding:14px;border-radius:10px;overflow:auto">${esc(JSON.stringify(state.health,null,2))}</pre></div>`}
};
const VM={dashboard:['Dashboard','Live Box intake and Vault filing oversight'],documents:['Documents','Live document worklist'],qc:['QC Workflow','Human oversight queue'],analytics:['Analytics','Admin detail and indexing health'],cro:['CRO View','Live CRO presence from intake'],onboarding:['Onboarding','Use intake to onboard new CROs'],vault:['Vault via Glean','Vault is the source of record'],agent:['Agent','Glean filing support'],admin:['Admin Health','Raw health response']} ;
function nav(id){document.getElementById('content').innerHTML=V[id]();document.getElementById('hT').textContent=VM[id][0];document.getElementById('hS').textContent=VM[id][1];document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-v="${id}"]`)?.classList.add('active');}
document.querySelectorAll('.nav-item[data-v]').forEach(item=>item.addEventListener('click',()=>nav(item.dataset.v)));
load(); setInterval(load,60000);
</script>
</body>
</html>
